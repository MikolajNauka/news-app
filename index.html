<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Newsy z Okolicy - Lokalne wiadomości</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Newsy z Okolicy">  
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #b7aea2;
            color: #1a1a2e;
            padding: 20px;
            min-height: 100vh;
        }

        /* Główny kontener */
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header z logo i tytułem */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
            background: linear-gradient(135deg, #cc8f7c 0%, #66263a 100%);
            border-radius: 28px;
            color: white;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 2.2rem;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        /* Panel wyszukiwania */
        .search-section {
            background: #dac9c5;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .input-group {
            flex: 2;
            min-width: 180px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #4a5568;
            margin-bottom: 6px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            transition: all 0.2s;
            background: #ebe9e6;
            font-family: inherit;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #6e5e56;
            background: #dac9c5;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }

        .btn {
            background: #99745e;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
        }

        .btn:hover {
            background: #bf986c;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-geo {
            background: #784048;
        }

        .btn-geo:hover {
            background: #d06872;
        }

        /* Filtry kategorii */
        .category-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            justify-content: center;
        }

        .category-chip {
            background: #e6e2df;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            user-select: none;
        }

        .category-chip.active {
            background: #ba9b58;
            color: white;
            box-shadow: 0 4px 8px rgba(106, 42, 31, 0.3);
        }

        .category-chip:hover:not(.active) {
            background: #dcd6d1;
            transform: scale(0.96);
        }

        /* Sekcja ładowania i błędów */
        .status-message {
            text-align: center;
            padding: 40px;
            background: #ebe9e6;
            border-radius: 28px;
            margin: 20px 0;
            color: #4a5568;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Siatka newsów */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 15px;
        }

        .news-card {
            background: #ebe9e6;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            height: 100%;
            cursor: pointer;
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -12px rgba(0,0,0,0.15);
        }

        .news-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #ebe9e6;
        }

        .news-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .news-source {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #a6765f;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .news-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .news-description {
            color: #4a5568;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 16px;
            flex: 1;
        }

        .news-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            font-size: 0.75rem;
            color: #718096;
        }

        .read-more {
            color: #993562;
            font-weight: 600;
            text-decoration: none;
        }

        /* Pasek offline dla PWA */
        .offline-banner {
            background: #fed7d7;
            color: #9b2c2c;
            padding: 10px;
            text-align: center;
            border-radius: 40px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            display: none;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 25px;
            color: #718096;
            font-size: 0.8rem;
        }

        /* Responsywność */
        @media (max-width: 640px) {
            body {
                padding: 12px;
            }

            .header h1 {
                font-size: 1.6rem;
            }

            .search-section {
                flex-direction: column;
                align-items: stretch;
            }

            .btn-geo {
                margin-top: 0;
            }

            .news-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Header -->
    <div class="header">
        <h1>📰 Newsy z Okolicy</h1>
        <p>Najświeższe wiadomości z Twojego miasta i regionu</p>
    </div>

    <!-- Baner offline (PWA) -->
    <div id="offlineBanner" class="offline-banner">
        ⚠️ Jesteś offline. Wyświetlam zapisane wiadomości z pamięci.
    </div>

    <!-- Panel wyszukiwania -->
    <div class="search-section">
        <div class="input-group" style="flex: 2;">
            <label>📍 Miasto lub lokalizacja</label>
            <input type="text" id="cityInput" placeholder="Np. Warszawa, Kraków, Poznań" value="Warszawa">
        </div>
        <div class="input-group" style="flex: 1;">
            <label>📅 Ilość artykułów</label>
            <select id="pageSizeSelect">
                <option value="6">6 newsów</option>
                <option value="9" selected>9 newsów</option>
                <option value="12">12 newsów</option>
            </select>
        </div>
        <button id="searchBtn" class="btn">🔍 Wyszukaj</button>
        <button id="geoBtn" class="btn btn-geo">📍 Moja okolica</button>
    </div>

    <!-- Filtry kategorii -->
    <div class="category-filters" id="categoryContainer">
        <div data-category="general" class="category-chip active">🌍 Wszystkie</div>
        <div data-category="technology" class="category-chip">💻 Technologie</div>
        <div data-category="sports" class="category-chip">⚽ Sport</div>
        <div data-category="business" class="category-chip">📈 Biznes</div>
        <div data-category="health" class="category-chip">🩺 Zdrowie</div>
        <div data-category="science" class="category-chip">🔬 Nauka</div>
        <div data-category="entertainment" class="category-chip">🎬 Rozrywka</div>
    </div>

    <!-- Status i komunikaty -->
    <div id="statusArea" class="status-message">
        <div id="loadingSpinner" class="loading-spinner" style="display: none;"></div>
        <div id="statusText">Wpisz miasto i kliknij "Wyszukaj" 📰</div>
    </div>

    <!-- Siatka newsów -->
    <div id="newsGrid" class="news-grid"></div>

    <!-- Footer -->
    <div class="footer">
        Źródło: GNews API • Autor: Mikołaj M. UWSB Merito
    </div>
</div>

<script src="main.js"></script>
<script>
  // Rejestracja Service Workera z obsługą błędów
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then(registration => {
          console.log('✅ Service Worker zarejestrowany:', registration.scope);
        })
        .catch(error => {
          console.error('❌ Błąd rejestracji Service Workera:', error);
        });
    });
  } else {
    console.log('⚠️ Service Worker nie jest wspierany przez tę przeglądarkę');
  }
</script>
</body>
</html>
